baseURL = "https://wekesae.github.io/callwall.github.io/"
locale = "en-us"
title = "Callwall"
theme = "tella"

[params]
    description = "VoIP Infrastructure, System Administration, and Web Engineering Solutions."

    # This configuration targets the structure in Screenshot 2026-07-01 093632.jpg
    [params.hero]
        enable = true

        # The theme layout populates this block as the responsive slider component
        [[params.hero.slider]]
            image = "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&auto=format&fit=crop"
            title = "Tella, A Hugo theme for Companies."

        [[params.hero.slider]]
            image = "https://images.unsplash.com/photo-1551434678-e076c223a692?q=80&w=1200&auto=format&fit=crop"
            title = "Robust Infrastructure & System Architecture."

# Expanded Main Navigation Menu
[[menu.main]]
    name = "Products"
    url = "/products/"
    weight = 1

[[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2

[[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 4
