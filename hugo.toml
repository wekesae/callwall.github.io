baseURL = "https://wekesae.github.io/callwall.github.io/"
title = "Tella"
theme = "tella"
languageCode = "en-us"

# Standard root configuration variables
TailwindCSS = true
tailwindcss = true

# GitHub Pages path optimization rules
relativeURLs = true
publishDir = "public"
resourceDir = "resources"

[params]
  description = "Tella, A Hugo theme for Companies."
  footer_text = "© 2026 Callwall. All rights reserved."
  TailwindCSS = true
  tailwindcss = true

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Products"
  url = "/products/"
  weight = 2

[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 5

[security]
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^node$', '^postcss$', '^tailwindcss$']
    osEnv = ['(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$']
