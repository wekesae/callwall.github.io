name: Build and deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Manually Clone Tella Theme
        run: |
          mkdir -p themes
          git clone https://github.com/opera7133/tella.git themes/tella
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Install Tailwind & Build Site
        run: |
          npm init -y
          npm install tailwindcss postcss postcss-cli autoprefixer
          
          # Inject the hugo command into an npm script to naturally pass the path
          npx node -e "const p=require('./package.json'); p.scripts={build:'hugo --minify'}; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          
          # Run the build through npm
          npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
