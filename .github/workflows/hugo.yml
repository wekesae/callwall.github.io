name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.88.1
    steps:
      - name: Checkout Site Source
        uses: actions/checkout@v4

      - name: Download Clean Theme Package
        run: |
          mkdir -p themes
          git clone https://github.com/opera7133/tella.git themes/tella

      - name: Mirror Official Example Site Structure Completely
        run: |
          # Copy everything from the official example folder
          cp -r themes/tella/exampleSite/* .
          
          # Remove the broken markdown demo file causing the shortcode crash
          rm -f content/blog/rich-content.md
          
          # Standardize filename format to config.toml for older Hugo core compatibility
          if [ -f hugo.toml ]; then
            mv hugo.toml config.toml
          fi
          
          # Dynamically point base URL to your repo route
          if [ -f config.toml ]; then
            sed -i 's|baseURL = ".*"|baseURL = "https://wekesae.github.io/callwall.github.io/"|g' config.toml
          fi

      - name: Setup Node.js Environment
        uses: actions/configure-pages@v4

      - name: Install Node Dependencies
        run: npm install

      - name: Setup Hugo Engine Bundle
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Compile and Build Static Production HTML
        run: hugo --gc --minify

      - name: Upload Finished Deployment Artifact Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Compiled Site Directly to GitHub Pages Live Grid
        id: deployment
        uses: actions/deploy-pages@v4
