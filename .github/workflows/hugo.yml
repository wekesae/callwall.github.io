name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.1
    steps:
      - name: Checkout Site Source
        uses: actions/checkout@v4

      - name: Download Clean Theme Package
        run: |
          mkdir -p themes
          git clone https://github.com/opera7133/tella.git themes/tella

      - name: Mirror Official Example Site Structure Completely
        run: |
          # Copy everything from the official example folder
          cp -r themes/tella/exampleSite/* .
          
          # Remove the broken markdown demo file
          rm -f content/blog/rich-content.md
          
          # Find configuration file name
          TARGET_CONFIG=""
          if [ -f hugo.toml ]; then TARGET_CONFIG="hugo.toml"; fi
          if [ -f config.toml ]; then TARGET_CONFIG="config.toml"; fi
          
          if [ ! -z "$TARGET_CONFIG" ]; then
            # Fix base URL using sed safely
            sed -i 's|baseURL = ".*"|baseURL = "https://wekesae.github.io/callwall.github.io/"|g' "$TARGET_CONFIG"
            
            # Use Python to insert values into the correct spots safely without creating duplicate blocks
            python3 - <<EOF
          filename = "$TARGET_CONFIG"
          with open(filename, 'r') as f:
              lines = f.readlines()
          
          new_lines = []
          # 1. Add global parameters at the absolute top of the file
          new_lines.append("TailwindCSS = true\n")
          new_lines.append("tailwindcss = true\n")
          
          for line in lines:
              new_lines.append(line)
              # 2. Inject parameters right after the [params] block definition
              if line.strip() == "[params]":
                  new_lines.append("  TailwindCSS = true\n")
                  new_lines.append("  tailwindcss = true\n")
          
          # 3. Append the explicit css table block safely at the end
          new_lines.append("\n[params.css]\n  TailwindCSS = true\n  tailwindcss = true\n")
          
          with open(filename, 'w') as f:
              f.writelines(new_lines)
          EOF
          fi

      - name: Setup Node.js Environment
        uses: actions/configure-pages@v4

      - name: Install Node Dependencies
        run: npm install

      - name: Setup Hugo Engine Bundle
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Compile and Build Static Production HTML
        run: hugo --gc --minify

      - name: Upload Finished Deployment Artifact Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Compiled Site Directly to GitHub Pages Live Grid
        id: deployment
        uses: actions/deploy-pages@v4
