name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.1
    steps:
      - name: Checkout Site Source
        uses: actions/checkout@v4

      - name: Auto-Clone Official Tella Theme Files
        run: |
          mkdir -p themes
          git clone https://github.com/opera7133/tella.git themes/tella

      - name: Setup Node.js Environment
        uses: actions/configure-pages@v4

      - name: Handle Node Framework Assets Cleanly
        run: |
          # If theme has an example package.json, grab it
          if [ -f themes/tella/exampleSite/package.json ]; then
            cp themes/tella/exampleSite/package.json .
          elif [ -f themes/tella/package.json ]; then
            cp themes/tella/package.json .
          fi

          # Safe copy configuration files only if they actually exist
          [ -f themes/tella/exampleSite/tailwind.config.js ] && cp themes/tella/exampleSite/tailwind.config.js . || true
          [ -f themes/tella/exampleSite/postcss.config.js ] && cp themes/tella/exampleSite/postcss.config.js . || true
          [ -f themes/tella/tailwind.config.js ] && cp themes/tella/tailwind.config.js . || true
          [ -f themes/tella/postcss.config.js ] && cp themes/tella/postcss.config.js . || true

          # If npm install runs, it handles the compilation securely
          npm install

      - name: Setup Hugo Engine Bundle
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Compile and Build Static Production HTML
        run: hugo --gc --minify

      - name: Upload Finished Deployment Artifact Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Compiled Site Directly to GitHub Pages Live Grid
        id: deployment
        uses: actions/deploy-pages@v4
