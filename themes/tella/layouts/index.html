<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Site.Title }}</title>
    {{ $styles := resources.Get "css/main.css" | postCSS }}
    <link rel="stylesheet" href="{{ $styles.Permalink }}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <!-- Simple Navbar -->
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-tight text-indigo-600">{{ .Site.Title }}</a>
            <nav class="space-x-6 text-sm font-medium text-slate-600">
                <a href="/" class="hover:text-indigo-600">Home</a>
                <a href="/blog/" class="hover:text-indigo-600">Blog</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <main class="max-w-3xl mx-auto px-6 py-20 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">
            {{ .Site.Params.hero.title }}
        </h1>
        <p class="mt-6 text-lg leading-8 text-slate-600">
            {{ .Site.Params.hero.subtitle }}
        </p>
    </main>
</body>
</html>
